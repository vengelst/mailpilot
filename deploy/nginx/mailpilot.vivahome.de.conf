# MailPilot Nginx site config
# Deployment path: /opt/mailpilot/deploy/nginx/mailpilot.vivahome.de.conf
#
# Copy/symlink on server:
#   /etc/nginx/sites-available/mailpilot.vivahome.de.conf
#   /etc/nginx/sites-enabled/mailpilot.vivahome.de.conf
#
# Then:
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d mailpilot.vivahome.de

server {
    server_name mailpilot.vivahome.de;

    # Required for larger uploads/attachments.
    client_max_body_size 64m;

    # Mail sync/AI endpoints can run longer than default proxy timeouts.
    proxy_connect_timeout 30s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;
    send_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:5600;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Needed for Next.js dev/prod upgrade and streaming paths.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_cache_bypass $http_upgrade;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/mailpilot.vivahome.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/mailpilot.vivahome.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}


server {
    if ($host = mailpilot.vivahome.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name mailpilot.vivahome.de;
    return 404; # managed by Certbot


}
