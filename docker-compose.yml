services:
  postgres:
    image: postgres:16-alpine
    container_name: mailpilot-postgres
    restart: unless-stopped
    ports:
      - "56432:5432"
    environment:
      POSTGRES_DB: mailpilot
      POSTGRES_USER: mailpilot
      POSTGRES_PASSWORD: mailpilot
    volumes:
      - mailpilot_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailpilot -d mailpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mailpilot_pgdata:
